openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sports Fashion Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: social
    description: Social/network links
  - name: orders
    description: Order operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: sport
          in: query
          required: false
          schema:
            type: string
        - name: newest
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /featured:
    get:
      operationId: listFeatured
      tags: [products]
      summary: Get featured products for hero section
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /social-links:
    get:
      operationId: listSocialLinks
      tags: [social]
      summary: Get all social/network links
      responses:
        "200":
          description: Social links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialLink"

  /store-stats:
    get:
      operationId: getStoreStats
      tags: [products]
      summary: Get store statistics
      responses:
        "200":
          description: Store statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreStats"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      required:
        - id
        - name
        - price
        - category
        - imageUrl
        - inStock
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        originalPrice:
          type: ["number", "null"]
        category:
          type: string
        sport:
          type: ["string", "null"]
        itemType:
          type: ["string", "null"]
        imageUrl:
          type: string
        additionalImages:
          type: array
          items:
            type: string
          nullable: true
        badge:
          type: ["string", "null"]
        inStock:
          type: boolean
        featured:
          type: boolean
        availableSizes:
          type: array
          items:
            type: string
          nullable: true
        customizable:
          type: boolean
        badgeOptions:
          type: array
          items:
            type: string
          nullable: true
        allowCustomName:
          type: boolean
        allowCustomNumber:
          type: boolean

    ProductInput:
      type: object
      required:
        - name
        - price
        - category
        - imageUrl
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
        category:
          type: string
        sport:
          type: string
        itemType:
          type: string
        imageUrl:
          type: string
        additionalImages:
          type: array
          items:
            type: string
        badge:
          type: string
        inStock:
          type: boolean
        featured:
          type: boolean
        availableSizes:
          type: array
          items:
            type: string
        customizable:
          type: boolean
        badgeOptions:
          type: array
          items:
            type: string
        allowCustomName:
          type: boolean
        allowCustomNumber:
          type: boolean

    Category:
      type: object
      required:
        - id
        - name
        - slug
        - productCount
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        productCount:
          type: integer
        imageUrl:
          type: ["string", "null"]

    SocialLink:
      type: object
      required:
        - id
        - platform
        - url
        - handle
      properties:
        id:
          type: integer
        platform:
          type: string
        url:
          type: string
        handle:
          type: string
        followerCount:
          type: ["string", "null"]

    StoreStats:
      type: object
      required:
        - totalProducts
        - totalCategories
        - featuredCount
        - brandsCount
        - totalOrders
        - pendingOrders
        - totalRevenue
      properties:
        totalProducts:
          type: integer
        totalCategories:
          type: integer
        featuredCount:
          type: integer
        brandsCount:
          type: integer
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        totalRevenue:
          type: number

    Order:
      type: object
      required:
        - id
        - customerName
        - customerPhone
        - items
        - totalPrice
        - status
        - createdAt
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: ["string", "null"]
        customerCity:
          type: ["string", "null"]
        customerStreet:
          type: ["string", "null"]
        customerHouseNumber:
          type: ["string", "null"]
        customerZipCode:
          type: ["string", "null"]
        items:
          type: string
        totalPrice:
          type: number
        status:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    OrderInput:
      type: object
      required:
        - customerName
        - customerPhone
        - items
        - totalPrice
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        customerCity:
          type: string
        customerStreet:
          type: string
        customerHouseNumber:
          type: string
        customerZipCode:
          type: string
        items:
          type: string
        totalPrice:
          type: number
        notes:
          type: string

    OrderStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
